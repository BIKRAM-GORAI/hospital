<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Dashboard</title>
  </head>
  <body>
    <h1>Welcome, Admin</h1>
    <div>
      <input id="searchInput" placeholder="search..." />
      <button id="searchBtn">Search</button>
      <a href="addDoctor.html"><button id="gotoAdd" >Add doctor</button></a>
    </div>

    <h2>Registered Doctors</h2>
    <div id="mini_msg" style="color: #666; margin-bottom: 8px"></div>
    <div id="doctorsList">Loading...</div>

    <script>
      // minimal sample renderer (keeps things simple)
      var doctors = []; // will be replaced by server data
      //empty array to hold doctors data fetched from server

      function renderDoctors() {
        //a function to render the list of doctors on the page

        var node = document.getElementById("doctorsList"); //doctorList is the div where we want to show the list of doctors
        //why we use var instead of const or let: to support older browsers

        node.innerHTML = ""; //clearing previous content or else Loading... will remain there

        if (!doctors || doctors.length === 0) {
          //if no doctors are present or doctors array is empty
          node.textContent = "No doctors yet.";
          return; // Shows a message and stops the function if no doctors exist.
        }

        doctors.forEach(function (d) {
          //for each doctor in the doctors array  //loops through the doctors objects
          var div = document.createElement("div"); //creating a div element to hold the doctor info of each doctor
          div.textContent =
            (d.name || "Unknown") + " — " + (d.department || ""); //setting the text content of the div to show doctor's name and department
          //for example: Dr. Smith — Cardiology
          node.appendChild(div); //appending the div to the doctorsList div in the HTML
        });
      }

      // ---------- Load live doctors from backend  ----------
      async function loadDoctorsFromServer() {
        //function to load doctors from server
        const msgNode =
          document.getElementById("mini_msg") ||
          document.getElementById("mini_msg_fallback"); //node to show messages to the user

        if (msgNode) {
          //what does this do? //checking if msgNode exists  //if it exists, we set its text content to show loading message
          msgNode.textContent = "Loading doctors...";
        } //show loading message

        try {
          const res = await fetch("/api/admin/doctors", {
            //making GET request to fetch doctors
            method: "GET",
            headers: {
              "Content-Type": "application/json", //we are expecting json response from server
              "x-admin-secret": "bikram776", // dev-only: replace with ADMIN_SECRET
            },
          });
          
          //ONE THING TO REMEMBER HERE THAT WE ARE USING THE SAME API CALL TO FETCH DOCTORS AND THE SAME FOR CREATING DOCTORS. SO MAKE SURE YOUR BACKEND HANDLES GET AND POST REQUESTS SEPARATELY.

          if (!res.ok) {
            let msg; //variable to hold error message

            try {
              msg = (await res.json()).message; //try to extract error message from server response
            } catch {}

            if (msgNode)
              msgNode.textContent = msg
                ? "Error: " + msg
                : "Failed to load doctors: " + res.status;

            return;
          }

          const body = await res.json(); //converts json to js object
          if (!body || !Array.isArray(body.doctors)) {
            //checking if body is valid and contains doctors array
            if (msgNode) {
              msgNode.textContent = "Unexpected server response";
            }
            return;
          }

          doctors = body.doctors.map((d) => ({//what is d here?// d represents each doctor object from the server response

            //converts raw api data into frontend friendly format
            _id: d._id || String(Date.now()), //unique id for each doctor
            name:  d.user.name || "Unknown", //doctor's name//why d.user and d.name both?//beacause name can be in user object or directly in doctor object
            //reads name from populated user
            department: d.department || "", // doctor's department
            experience: d.experience || 0, //doctor's experience
            phone:  d.user.phone || "", // doctor's phone number
          })); //ends map conversion

          //REFER TO ADMINCONTROLLER FOR CHECKING THE RESPONSE STRUCTURE

          if (msgNode) msgNode.textContent = ""; //clears any previous messages
          if (typeof renderDoctors === "function") renderDoctors(); //calls renderDoctors to update the UI
        } catch (err) {
          console.error("Failed to load doctors:", err);
          if (msgNode) msgNode.textContent = "Network error loading doctors"; //shows network error message
        }
      }

      // Call it once on load
      loadDoctorsFromServer();

     
    </script>
  </body>
</html>
