<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Doctor Addition</title>
  </head>

  <body>
    <div class="main">
      <h2>Add a New Doctor</h2>

      <div class="form-box">
        <form id="addDoctorForm">
          <label for="d_name">Full Name</label>
          <input
            id="d_name"
            type="text"
            placeholder="Enter Full name"
            required
          />

          <label for="d_dept">Specialisation</label>
          <input
            id="d_dept"
            type="text"
            placeholder="Enter Specialisation or Department"
            required
          />

          <label for="d_exp">Experience</label>
          <input
            id="d_exp"
            type="number"
            placeholder="Enter Experience"
            required
          />

          <label for="d_email">Email</label>
          <input
            id="d_email"
            type="email"
            placeholder="Enter Email "
            required
          />

          <label for="d_phone">Phone number</label>
          <input
            id="d_phone"
            type="tel"     
            placeholder="Enter Phone Number"
            pattern="[0-9]"
            required
            /> 
              <!-- ! phone number should be of type tel because we can use trim functions on it,but using it on number type gives error  -->

          <button type="button" onclick="create()">Create</button> 

          <!-- !we need to write type="button" because by default button is of type submit and it will try to submit the form and refresh the page -->

        </form>
        <p id="feedback"></p>
        <!-- For server response -->
      </div>
    </div>

    <script>
      async function create() {         // all these will be executed when we click on create button
        const name = document.getElementById("d_name").value.trim();
        const dept = document.getElementById("d_dept").value.trim();


        const exp = Number(document.getElementById("d_exp").value);
        //VERY IMPORTATNT
        // we are using Number() because the value taken from input field is always of string type
        // so if we do not convert it into number then even if user enters a number it will be treated as string  

        //also when using Number if some characters is here in the string then it will convert it to NaN


        const email = document.getElementById("d_email").value.trim();
        const phone = document.getElementById("d_phone").value.trim();
        const feedback = document.getElementById("feedback");

        // Simple validation
        if (!name || !dept || Number.isNaN(exp) || !email || !phone)   //Number.isNaN(exp) is used to check if exp is NaN or not
        {
          feedback.textContent = "Please fill all the fields";
          return;
        }
        try {
            const response = await fetch("/api/admin/doctors", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ name, department:dept, experience:exp, email, phone }),
            });
          

            let data;
            try {
              data = await response.json();
            } catch (error) {
              feedback.textContent = "Invalid server response";
              return;
            }

            if (!response.ok) {
              feedback.textContent = data.message || "An error occurred";
              return;
            }

          setTimeout(() => {
            feedback.textContent =
              "Doctor added successfully! Redirecting to dashboard...";
            window.location.href = "/adminDashboard.html";
          }, 2000);
        }
        catch (error) {
          feedback.textContent = "Network error. Please try again later.";
        }
      }
    </script>
</body>
</html>
