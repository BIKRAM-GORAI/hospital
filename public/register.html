


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER</title>
</head>
<body>
    <div class="register">
        <h2>REGISTER</h2>
        <label for="name">Name:</label> 
        <input type="text" id="name" placeholder="Enter your name"/>
        <br ><br>   

        <label for="email">Email:</label> 
        <input type="email" id="email" placeholder="Enter your email" />
        <br ><br >      
         
        <label for="password">Password:</label> 
        <input type="password" id="password" placeholder="Enter your password">
        <br ><br>    

        <label for="phone">Phone Number:</label> 
        <input type="tel" id="phone" placeholder="Enter your phone number"/>
        <br><br>

        <label for="address">Address:</label> 
        <input type="text" id="address" placeholder="Enter your address"/>
        <br ><br >

        <button onclick="register()">Register</button>


        <p id="feedback"></p>          <!-- !   for server response -->

        <button onclick="window.location.href='index.html'">Back to Home</button>
    </div>
</body>
</html>

<!-- ! DESIGNING PART IS UPTO WHO IS DOING THE FRONTEND -->
<!-- ^ YOU MAY CHANGE THE HTML PART AND CSS PART FOR THE ABOVE CODE BUT DO NOT CHANGE THE SCRIPT-->



<script>
    async function register(){
        const name=document.getElementById("name").value.trim();        
        const email=document.getElementById("email").value.trim();        
        const password=document.getElementById("password").value.trim();        
        const phone=document.getElementById("phone").value.trim();        
        const address=document.getElementById("address").value.trim();        
       // const role="patient";   //by default every registered user is a patient//no need because we have done it in authcontroller


        const feedback=document.getElementById("feedback");//this is for showing the error messages

        //simple validation
        if(!name || !email || !password || !phone || !address){
            feedback.textContent="Please fill all the fields";
            return;
        }

        //now we will send the data to the backend
        try{
            const response=await fetch('/api/auth/register',{
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({name,email,password,phone,address})
            });


            //for error handling in case server responds with no body
            //very important
            let data;
            try{
                data=await response.json();
            }
            catch(err){
                feedback.textContent="Server error. Please try again later.";
                return;
            }


            
            if(!response.ok){
                feedback.textContent=data.message || "Something went wrong";
                return;
            }

            feedback.textContent="Registration successful! You can now login.";

            setTimeout(()=>{
                window.location.href='login.html';
            },2000); // Redirect to login page after 2 seconds
        }catch(error){
            feedback.textContent="An error occurred. Please try again later.";
        }
    }
</script>
